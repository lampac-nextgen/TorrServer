---
# Fast local builds: reduced platform matrix (see Makefile GORELEASER_CONFIG).
# CI / release use .goreleaser.yaml
version: 2

project_name: TorrServer

report_sizes: false

env:
  - NODE_OPTIONS=--openssl-legacy-provider
  - CLEAN_ENV=env GOOS= GOARCH= GOARM=
  - Metadata_Description=Torrent stream server
  - Metadata_License=GPL-3.0

git:
  tag_sort: -version:refname

snapshot:
  version_template: "{{ .Tag }}-{{ .ShortCommit }}"

before:
  hooks:
    - '{{ .Env.CLEAN_ENV }} {{ envOrDefault "GO_BINARY" "go" }} run gen_web.go'
    - '{{ .Env.CLEAN_ENV }} {{ envOrDefault "GO_BINARY" "go" }} install github.com/swaggo/swag/cmd/swag@latest'
    - bash -c 'cd server && {{ .Env.CLEAN_ENV }} swag init -g web/server.go'
    # Windows gst embed: zip gst-libs for //go:embed (binary-gst + embed_gstlib)
    - bash -c 'cd server/gstreamer && rm -f embedded_gstlib_windows_amd64.zip && python3 -c "import shutil; shutil.make_archive(\"embedded_gstlib_windows_amd64\", \"zip\", \"gst-libs/win-x86_64\")"'

builds:
  - id: binary
    tool: '{{ envOrDefault "GO_BINARY" "go" }}'
    dir: server
    main: ./cmd
    binary: '{{ .ProjectName }}-{{ .Os }}-{{ if eq .Arch "arm" }}arm{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}'
    no_unique_dist_dir: true
    flags:
      - -trimpath
    tags:
      - nosqlite
    ldflags:
      - -s -w -checklinkname=0 -X server/version.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64

  - id: binary-gst
    tool: '{{ envOrDefault "GO_BINARY" "go" }}'
    dir: server
    main: ./cmd
    binary: '{{ .ProjectName }}-gst-{{ .Os }}-{{ if eq .Arch "arm" }}arm{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}'
    no_unique_dist_dir: true
    # CGO_ENABLED=0: static Go ELF; loads libgstreamer at runtime via purego/dlopen (not for Docker)
    flags:
      - -trimpath
    tags:
      - nosqlite
      - gst
    ldflags:
      - -s -w -checklinkname=0 -X server/version.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
    overrides:
      # Single-file Windows build with embedded GStreamer runtime
      - goos: windows
        goarch: amd64
        tags:
          - nosqlite
          - gst
          - embed_gstlib

upx:
  - enabled: '{{ envOrDefault "UPX_ENABLED" "false" }}'
    ids:
      - binary
      - binary-gst
    goos:
      - linux
    goarch:
      - arm64
      - amd64
    compress: best
    lzma: true

archives:
  - id: releases
    ids:
      - binary
    formats:
      - binary
    name_template: "TorrServer-{{ .Os }}-{{ .Arch }}{{ if .Arm }}{{ .Arm }}{{ end }}"

  - id: releases-gst
    ids:
      - binary-gst
    formats:
      - binary
    name_template: "TorrServer-gst-{{ .Os }}-{{ .Arch }}{{ if .Arm }}{{ .Arm }}{{ end }}"

source:
  enabled: false

checksum:
  name_template: checksums.txt

release:
  mode: append
  replace_existing_artifacts: true
  make_latest: true

changelog:
  use: git
  sort: asc

dockers_v2:
  - id: docker
    ids:
      - binary
    dockerfile: Dockerfile
    images:
      - '{{ envOrDefault "DOCKER_IMAGE_ID" (printf "ghcr.io/%s" (envOrDefault "REGISTRY_IMAGE" "yourok/torrserver")) }}'
    tags:
      - '{{ .Tag }}'
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - docker-entrypoint.sh
    labels:
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.description": "{{.Env.Metadata_Description}}"
      "org.opencontainers.image.url": "{{.GitURL}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.version": "{{.Tag}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.licenses": "{{.Env.Metadata_License}}"
    annotations:
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.description": "{{.Env.Metadata_Description}}"
      "org.opencontainers.image.url": "{{.GitURL}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.version": "{{.Tag}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.licenses": "{{.Env.Metadata_License}}"
    sbom: "{{ not .IsSnapshot }}"
